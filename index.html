<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Colours</title>
    
    <style>
       .colour-img{ width: 25mm; min-height: 30mm;}     
       
    </style>
</head>
<body>
    <h1>Colours</h1>
    <h2>Learn the Colours in German!!!</h2>
    <h2>Happy German Learning</h2>
    <h3 class="colour-title" id="red">Rot</h3>
    <img src="red triangle.jpeg" alt="Triangle" class="colour-img">
    <h3 class="colour-title" id="orange">Orange</h3>
    <img src="orange square.jpeg" alt="Square" class="colour-img">
    <h3 class="colour-title" id="purple">Lila</h3>
    <img src="purple triangle.jpeg" alt="Triangle" class="colour-img">
    <h3 class="colour-title" id=" yellow">Gelb</h3>
    <img src="yellow spherical.jpeg" alt="Spherical" class="colour-img">
    <h3 class="colour-title" id="Blue">Blau</h3>
    <img src="blue rectangle.jpeg" alt="Rectangle" class="colour-img">    
  
</body>

</html>
